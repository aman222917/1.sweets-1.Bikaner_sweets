<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweets Shop | Premium Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .hero-gradient { background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%); }
        .sale-badge { background: #ef4444; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <!-- Navbar & Search -->
    <nav class="sticky top-0 z-50 bg-white shadow-md p-4">
        <div class="max-w-6xl mx-auto flex flex-col gap-3">
            <div class="flex justify-between items-center">
                <h1 id="shop-name" class="text-2xl font-bold text-orange-600">Local Sweets Shop</h1>
                <a href="#contact" class="text-sm bg-orange-100 text-orange-700 px-3 py-1 rounded-full border border-orange-200">Contact Us</a>
            </div>
            <div class="relative">
                <input type="text" id="search-bar" placeholder="Search for sweets (e.g., Ladoo, Barfi)..." 
                       class="w-full p-3 pl-10 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none">
                <i class="fa fa-search absolute left-3 top-4 text-gray-400"></i>
            </div>
        </div>
    </nav>

    <!-- 1. Hero Rail (Top 5) -->
    <section id="hero-section" class="mt-4 hidden">
        <h2 class="px-4 text-lg font-bold mb-2">Today's Specials</h2>
        <div id="hero-rail" class="flex overflow-x-auto no-scrollbar snap-x snap-mandatory gap-4 px-4 pb-4">
            <!-- Hero items injected here -->
        </div>
    </section>

    <!-- 2. Sale Rail -->
    <section id="sale-section" class="mt-6 hidden">
        <h2 class="px-4 text-lg font-bold mb-2 text-red-600"><i class="fa fa-bolt"></i> Flash Sale</h2>
        <div id="sale-rail" class="flex overflow-x-auto no-scrollbar gap-4 px-4 pb-4">
            <!-- Sale items injected here -->
        </div>
    </section>

    <!-- 3. Category Filter & General Grid -->
    <section class="mt-6 max-w-6xl mx-auto px-4">
        <div id="category-tabs" class="flex gap-2 overflow-x-auto no-scrollbar mb-4">
            <button onclick="filterCategory('All')" class="whitespace-nowrap px-4 py-2 rounded-full bg-orange-600 text-white font-medium">All</button>
            <!-- Categories injected here -->
        </div>
        
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 pb-20">
            <!-- Products injected here -->
        </div>
    </section>

    <!-- Footer Contact -->
    <footer id="contact" class="bg-gray-900 text-white p-8 mt-10 mb-10 rounded-t-3xl">
        <h3 class="text-xl font-bold mb-4">Find Us</h3>
        <p id="shop-address" class="text-gray-400 mb-4">123, Sweet Street, Local Market, City</p>
        <div class="w-full h-48 bg-gray-700 rounded-xl overflow-hidden mb-6">
            <!-- Add Map Embed Here -->
            <div class="flex items-center justify-center h-full text-gray-500">Map Location Preview</div>
        </div>
        <p class="text-center text-gray-500 text-xs">© 2026 Website built by Aman Jain</p>
    </footer>

    <script>
        // PASTE YOUR PUBLISHED CSV URL HERE
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRDlfQXzEpY7D42rWB37ByNmnAv8cEXOCDxRlwd5s7cyZg5nYHOuQUKMTmEt6SEaV1BLVU_SW3V9q_5/pubhtml?gid=0&single=true';
        const WHATSAPP_NUMBER = '918960440328'; // Format: CountryCodeNumber

        let allProducts = [];
        let fuse;

        async function fetchData() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                
                allProducts = rows.map(row => {
                    const cols = row.split(',');
                    return {
                        category: cols[0]?.trim(),
                        name: cols[1]?.trim(),
                        desc: cols[2]?.trim(),
                        originalPrice: cols[3]?.trim(),
                        discountPrice: cols[4]?.trim(),
                        unit: cols[5]?.trim(),
                        image: cols[6]?.trim(),
                        isHero: cols[7]?.toLowerCase().trim() === 'yes',
                        isSale: cols[8]?.toLowerCase().trim() === 'yes',
                        active: cols[9]?.toLowerCase().trim() === 'yes',
                        priority: parseInt(cols[10]) || 99
                    };
                }).filter(p => p.active && p.name);

                allProducts.sort((a, b) => a.priority - b.priority);
                
                // Initialize Smart Search
                fuse = new Fuse(allProducts, { keys: ['name', 'category'], threshold: 0.4 });
                
                renderUI(allProducts);
                renderCategories();
            } catch (err) { console.error("Error fetching sheet:", err); }
        }

        function createProductCard(p, isCompact = false) {
            const hasDiscount = p.originalPrice && p.originalPrice > p.discountPrice;
            const waMsg = `Hi, I want to order ${p.name} (${p.discountPrice}/${p.unit})`;
            const waLink = `[link removed]{WHATSAPP_NUMBER}?text=${encodeURIComponent(waMsg)}`;

            return `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex-shrink-0 ${isCompact ? 'w-48' : 'w-full'}">
                    <div class="relative h-40">
                        <img src="${p.image}" class="w-full h-full object-cover" alt="${p.name}">
                        ${hasDiscount ? `<span class="absolute top-2 left-2 sale-badge">SAVE</span>` : ''}
                    </div>
                    <div class="p-3">
                        <h3 class="font-bold text-sm truncate">${p.name}</h3>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="text-orange-600 font-bold">₹${p.discountPrice}</span>
                            ${hasDiscount ? `<span class="text-gray-400 text-xs line-through">₹${p.originalPrice}</span>` : ''}
                        </div>
                        <p class="text-[10px] text-gray-400">${p.unit}</p>
                        <a href="${waLink}" class="mt-3 block text-center bg-green-500 text-white py-2 rounded-lg text-sm font-bold">
                            <i class="fab fa-whatsapp"></i> Order
                        </a>
                    </div>
                </div>
            `;
        }

        function renderUI(products) {
            const grid = document.getElementById('product-grid');
            const heroRail = document.getElementById('hero-rail');
            const saleRail = document.getElementById('sale-rail');

            // Hero Section
            const heroItems = products.filter(p => p.isHero).slice(0, 5);
            if (heroItems.length > 0) {
                document.getElementById('hero-section').classList.remove('hidden');
                heroRail.innerHTML = heroItems.map(p => `
                    <div class="relative w-80 h-48 rounded-2xl overflow-hidden flex-shrink-0 snap-center">
                        <img src="${p.image}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 hero-gradient flex flex-col justify-end p-4 text-white">
                            <h3 class="text-lg font-bold">${p.name}</h3>
                            <p class="text-sm text-gray-200">Just ₹${p.discountPrice} / ${p.unit}</p>
                        </div>
                    </div>
                `).join('');
            }

            // Sale Section
            const saleItems = products.filter(p => p.isSale);
            if (saleItems.length > 0) {
                document.getElementById('sale-section').classList.remove('hidden');
                saleRail.innerHTML = saleItems.map(p => createProductCard(p, true)).join('');
            }

            // Main Grid
            grid.innerHTML = products.map(p => createProductCard(p)).join('');
        }

        function renderCategories() {
            const tabs = document.getElementById('category-tabs');
            const cats = ['All', ...new Set(allProducts.map(p => p.category))];
            tabs.innerHTML = cats.map(c => `
                <button onclick="filterCategory('${c}')" class="whitespace-nowrap px-4 py-2 rounded-full border border-gray-200 bg-white text-gray-600 text-sm font-medium">
                    ${c}
                </button>
            `).join('');
        }

        function filterCategory(cat) {
            const filtered = cat === 'All' ? allProducts : allProducts.filter(p => p.category === cat);
            renderUI(filtered);
        }

        document.getElementById('search-bar').addEventListener('input', (e) => {
            const query = e.target.value;
            if (query.length > 2) {
                const results = fuse.search(query).map(r => r.item);
                renderUI(results);
            } else if (query.length === 0) {
                renderUI(allProducts);
            }
        });

        fetchData();
    </script>
</body>
</html>
