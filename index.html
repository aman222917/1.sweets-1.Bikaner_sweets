<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sharma Sweets | Best Sweet Shop Near Me</title>

<meta name="description"
content="Fresh sweets, kaju katli, rasgulla, laddoo, milk cake and festive specials. Order online from Sharma Sweets. Premium sweet shop near me.">

<meta name="keywords"
content="sweet shop near me, Sharma Sweets, sweets shop in locality, kaju katli, rasgulla, laddoo, mithai">

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>

<style>
html{
scroll-behavior:smooth;
}

body{
background:#faf7f2;
}

.hide-scrollbar::-webkit-scrollbar{
display:none;
}

.hide-scrollbar{
-ms-overflow-style:none;
scrollbar-width:none;
}

.hero-gradient{
background:
linear-gradient(
135deg,
#f59e0b,
#ef4444
);
}

.sale-gradient{
background:
linear-gradient(
135deg,
#dc2626,
#f97316
);
}
</style>
</head>

<body>

<!-- NAVBAR -->

<header class="sticky top-0 z-50 bg-white shadow-sm">
<div class="max-w-7xl mx-auto px-4 py-3">

<div class="flex items-center justify-between">

<div>
<h1
id="shopName"
class="text-xl font-bold text-orange-600">
Loading...
</h1>

<p
id="tagLine"
class="text-xs text-gray-500">
Loading...
</p>
</div>

<div class="text-orange-600">
<i class="fa-solid fa-store text-2xl"></i>
</div>

</div>

<div class="mt-3">
<div class="relative">

<input
id="searchInput"
type="text"
placeholder="Search sweets..."
class="w-full border rounded-xl px-4 py-3 pl-10 focus:outline-none focus:ring-2 focus:ring-orange-400">

<i class="fa-solid fa-magnifying-glass absolute left-3 top-4 text-gray-400"></i>

</div>
</div>

</div>
</header>

<!-- HERO BANNER -->

<section
id="bannerCarousel"
class="relative overflow-hidden">

<div
id="bannerContainer">

</div>

</section>
<!-- HERO RAIL -->

<section class="py-6">
<div class="max-w-7xl mx-auto px-4">

<div class="flex items-center justify-between mb-4">
<h2 class="text-xl font-bold">
⭐ Featured Specials
</h2>
</div>

<div
id="heroRail"
class="flex gap-4 overflow-x-auto hide-scrollbar">
</div>

</div>
</section>

<!-- SALE RAIL -->

<section class="py-6">

<div class="max-w-7xl mx-auto px-4">

<div
class="sale-gradient text-white rounded-2xl p-4 mb-5">

<h2 class="text-2xl font-bold">
⚡ Flash Sale
</h2>

<p class="text-sm opacity-90">
Limited-time sweet deals
</p>

</div>

<div
id="saleRail"
class="flex gap-4 overflow-x-auto hide-scrollbar">
</div>

</div>

</section>

<!-- CATEGORY TABS -->

<section class="py-4">

<div class="max-w-7xl mx-auto px-4">

<div
id="categoryTabs"
class="flex gap-2 overflow-x-auto hide-scrollbar">
</div>

</div>

</section>

<!-- PRODUCTS -->

<section class="pb-20">

<div class="max-w-7xl mx-auto px-4">

<div
id="productsGrid"
class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
</div>

</div>

</section>

<script>

const SPREADSHEET_ID =
"1aULDiifd6LFPOms41yWzglTy5-lmowMDISCyFdUo36w";

const PRODUCTS_URL =
`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=Products`;

let WHATSAPP_NUMBER =
"918960440328";

let settings = {};
let bannerSlides = [];
let currentSlide = 0;
let products = [];
let filteredProducts = [];
let fuse;
let currentCategory = "All";

async function loadSettings(){

const url =
`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=SiteSettings`;

const response =
await fetch(url);

const csv =
await response.text();

const rows =
parseCSV(csv);

const data = {};

rows.forEach(row=>{

data[row.Key] =
row.Value;

});

async function loadBannerSlides(){

const url =
`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=BannerCarousel`;

const response =
await fetch(url);

const csv =
await response.text();

const rows =
parseCSV(csv);

bannerSlides =
rows
.filter(
item =>
(item.Active || "")
.toLowerCase() === "yes"
)
.sort(
(a,b)=>
Number(a.Priority||999)
-
Number(b.Priority||999)
);

renderBannerCarousel();

function startBannerRotation(){

setInterval(()=>{

if(!bannerSlides.length)
return;

currentSlide++;

if(
currentSlide >=
bannerSlides.length
){

currentSlide = 0;

}

renderBannerCarousel();

},5000);

}

}

settings = data;

WHATSAPP_NUMBER =
settings.WhatsAppNumber ||
WHATSAPP_NUMBER;

applySettings();

}

function applySettings(){

const title =
document.querySelector("title");

if(settings.ShopName){

title.textContent =
settings.ShopName;

}

const shopName =
document.getElementById("shopName");

if(shopName){

shopName.textContent =
settings.ShopName;

}

function renderBannerCarousel(){

if(!bannerSlides.length)
return;

const slide =
bannerSlides[currentSlide];

document
.getElementById(
"bannerContainer"
)
.innerHTML =
`
<div
class="relative h-[320px] md:h-[450px]">

<img
src="${slide.ImageURL}"
class="absolute inset-0 w-full h-full object-cover">

<div
class="absolute inset-0 bg-black/50">
</div>

<div
class="relative z-10 max-w-7xl mx-auto px-4 h-full flex items-center">

<div class="text-white">

<h2
class="text-3xl md:text-5xl font-bold">

${slide.Title}

</h2>

<p
class="mt-3 text-lg opacity-90">

${slide.Subtitle}

</p>

</div>

</div>

</div>
`;

}

const tagLine =
document.getElementById("tagLine");

if(tagLine){

tagLine.textContent =
settings.TagLine;

}

const heroTitle =
document.getElementById("heroTitle");

if(heroTitle){

heroTitle.textContent =
settings.HeroTitle;

}

const heroSubtitle =
document.getElementById("heroSubtitle");

if(heroSubtitle){

heroSubtitle.textContent =
settings.HeroSubtitle;

}

}

async function loadProducts(){

try{

const response = await fetch(PRODUCTS_URL);

const csvText = await response.text();

const rows = parseCSV(csvText);

products = rows
.filter(item =>
(item.Active || "")
.toLowerCase() === "yes"
)
.sort((a,b)=>
Number(a.Priority || 999)
-
Number(b.Priority || 999)
);

filteredProducts = [...products];

initializeFuse();

renderAll();

}
catch(error){

console.error(error);

document.getElementById("productsGrid").innerHTML =
`
<div class="col-span-full text-center text-red-500">
Unable to load products.
</div>
`;

}

}

function parseCSV(csv){

const lines = csv.trim().split("\n");

const headers = lines[0]
.split(",")
.map(h=>h.trim());

return lines.slice(1).map(line=>{

const values = splitCSVLine(line);

const obj = {};

headers.forEach((header,index)=>{

obj[header] = values[index]
? values[index].trim()
: "";

});

return obj;

});

}

function splitCSVLine(line){

const result = [];
let current = "";
let insideQuotes = false;

for(let char of line){

if(char === '"'){
insideQuotes = !insideQuotes;
continue;
}

if(char === "," && !insideQuotes){

result.push(current);

current = "";

}else{

current += char;

}

}

result.push(current);

return result;

}

function initializeFuse(){

fuse = new Fuse(products,{
keys:[
"ItemName",
"Description",
"Category"
],
threshold:0.4,
includeScore:true
});

}

function formatPrice(value){

return Number(value).toLocaleString("en-IN");

}

function getDiscountPercent(original,discount){

const save = original - discount;

return Math.round((save/original)*100);

}

function createWhatsAppLink(product){

const price =
product.DiscountPrice || product.OriginalPrice;

const msg =
`Hi, I want to order 1${product.Unit} of ${product.ItemName} for ₹${price}`;

return `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;

}

function renderHeroRail(){

const heroItems = products
.filter(item =>
(item.IsHero || "")
.toLowerCase() === "yes"
)
.slice(0,5);

const container =
document.getElementById("heroRail");

container.innerHTML =
heroItems.map(product=>`

<div class="min-w-[260px] bg-white rounded-2xl shadow">

<img
src="${product.ImageURL}"
class="w-full h-44 object-cover rounded-t-2xl">

<div class="p-4">

<h3 class="font-bold">
${product.ItemName}
</h3>

<p class="text-sm text-gray-500 mt-1">
${product.Description}
</p>

<div class="mt-3 flex justify-between items-center">

<span class="font-bold text-orange-600">
₹${formatPrice(product.DiscountPrice)}
</span>

<a
href="${createWhatsAppLink(product)}"
target="_blank"
class="bg-green-500 text-white px-4 py-2 rounded-xl">

Order

</a>

</div>

</div>

</div>

`).join("");

}

function renderSaleRail(){

const saleItems = products.filter(item =>
(item.IsSale || "")
.toLowerCase() === "yes"
);

const container =
document.getElementById("saleRail");

container.innerHTML =
saleItems.map(product=>{

const original =
Number(product.OriginalPrice);

const discount =
Number(product.DiscountPrice);

const hasDiscount =
original > discount;

return `

<div class="min-w-[260px] bg-white rounded-2xl shadow">

<img
src="${product.ImageURL}"
class="w-full h-44 object-cover rounded-t-2xl">

<div class="p-4">

<div class="flex justify-between">

<h3 class="font-bold">
${product.ItemName}
</h3>

${hasDiscount ? `
<span class="bg-red-100 text-red-600 px-2 py-1 rounded-full text-xs">
Save ${getDiscountPercent(original,discount)}%
</span>
` : ""}

</div>

<div class="mt-3">

${hasDiscount ? `
<span class="line-through text-gray-400">
₹${formatPrice(original)}
</span>
` : ""}

<span class="font-bold text-red-600 ml-2">
₹${formatPrice(discount)}
</span>

</div>

<a
href="${createWhatsAppLink(product)}"
target="_blank"
class="mt-4 block text-center bg-green-500 text-white py-2 rounded-xl">

Order Now

</a>

</div>

</div>

`;

}).join("");

}

function renderCategories(){

const categories = [
"All",
...new Set(products.map(p=>p.Category))
];

const tabs =
document.getElementById("categoryTabs");

tabs.innerHTML =
categories.map(category=>`

<button
onclick="selectCategory('${category}')"
class="
category-btn
px-4
py-2
rounded-full
whitespace-nowrap
${currentCategory===category
?
'bg-orange-500 text-white'
:
'bg-white'
}
">

${category}

</button>

`).join("");

}

function selectCategory(category){

currentCategory = category;

applyFilters();

renderCategories();

}

function applyFilters(){

const search =
document.getElementById("searchInput")
.value
.trim();

let data = [...products];

if(search){

data = fuse
.search(search)
.map(result=>result.item);

}

if(currentCategory !== "All"){

data = data.filter(
item =>
item.Category === currentCategory
);

}

filteredProducts = data;

renderGrid();

}

function renderGrid(){

const grid =
document.getElementById("productsGrid");

grid.innerHTML =
filteredProducts.map(product=>{

const original =
Number(product.OriginalPrice);

const discount =
Number(product.DiscountPrice);

const hasDiscount =
original > discount;

return `

<div class="bg-white rounded-2xl shadow overflow-hidden">

<img
src="${product.ImageURL}"
class="w-full h-40 object-cover">

<div class="p-3">

<div class="font-semibold">
${product.ItemName}
</div>

<div class="text-xs text-gray-500 mt-1">
${product.Description}
</div>

<div class="mt-3">

${hasDiscount ? `

<span class="line-through text-gray-400 text-sm">
₹${formatPrice(original)}
</span>

` : ""}

<span class="font-bold text-orange-600 ml-1">
₹${formatPrice(discount)}
</span>

</div>

<div class="text-xs text-gray-500 mt-1">
per ${product.Unit}
</div>

<a
href="${createWhatsAppLink(product)}"
target="_blank"
class="mt-3 flex items-center justify-center gap-2 bg-green-500 text-white rounded-xl py-2">

<i class="fa-brands fa-whatsapp"></i>

Order

</a>

</div>

</div>

`;

}).join("");

}

function renderAll(){

renderHeroRail();
renderSaleRail();
renderCategories();
renderGrid();

}

document
.getElementById("searchInput")
.addEventListener("input",applyFilters);

(async()=>{

await loadSettings();

// await loadBannerSlides();

await loadProducts();

// startBannerRotation();
})();

</script>

</body>
</html>
